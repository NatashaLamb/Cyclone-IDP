.bnv{background:var(--wh);border-top:1px solid var(--bd);display:flex;flex-shrink:0;padding-bottom:5px;}
.ntb{flex:1;padding:9px 2px 3px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;position:relative;}
.ntb .nl{font-size:9px;font-weight:500;color:var(--mt);}
.ntb.on .nl{color:var(--cr);font-weight:700;}
.ntb.on::after{content:'';position:absolute;bottom:0;width:16px;height:2px;background:var(--cr);border-radius:1px;}
.p18{padding:15px 16px 32px;}
.ccat{background:var(--wh);border:1.5px solid var(--bd);border-radius:18px;padding:13px 15px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;width:100%;text-align:left;}

.cico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qbar{height:3px;background:var(--bd);border-radius:2px;margin-bottom:14px;overflow:hidden;}
.qfil{height:100%;border-radius:2px;}
.qchip{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.1px;border-radius:20px;padding:3px 9px;margin-bottom:10px;}
.opt{background:var(--wh);border:1.5px solid var(--bd);border-radius:13px;padding:10px 12px;margin-bottom:7px;cursor:pointer;display:flex;align-items:flex-start;gap:9px;width:100%;text-align:left;}
.olet{width:20px;height:20px;border-radius:50%;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:var(--mt);}
.nxt{width:100%;border:none;border-radius:13px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;font-family:system-ui,sans-serif;}
.axrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);}
.sq{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:2px;}
.resc{background:var(--wh);border:1.5px solid var(--bd);border-radius:14px;padding:11px 13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.bk{display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;font-size:12px;font-weight:600;padding:0;margin-bottom:12px;color:var(--mt);}

function radar(scores,axes,color){
  const cx=140,cy=118,r=63,n=axes.length;
  function pt(ai,lv){const a=(ai/n)*2*Math.PI-Math.PI/2;return[cx+(lv/5)*r*Math.cos(a),cy+(lv/5)*r*Math.sin(a)];}
  let g='',al='',lb='';
  for(let lv=1;lv<=5;lv++){const pts=axes.map((_,i)=>pt(i,lv));g+=`<polygon points="${pts.map(p=>p.map(v=>v.toFixed(1)).join(',')).join(' ')}" fill="none" stroke="#E8DFC8" stroke-width="${lv===5?1.5:0.7}"/>`;}
  axes.forEach((_,i)=>{
    const p=pt(i,5);al+=`<line x1="${cx}" y1="${cy}" x2="${p[0].toFixed(1)}" y2="${p[1].toFixed(1)}" stroke="#E8DFC8" stroke-width="1"/>`;
    const lp=pt(i,6.35);
    const anch=lp[0]<cx-8?'end':lp[0]>cx+8?'start':'middle';
    const dy=lp[1]<cy-8?-2:lp[1]>cy+8?13:6;
    lb+=`<text x="${lp[0].toFixed(1)}" y="${(lp[1]+dy).toFixed(1)}" text-anchor="${anch}" font-size="9" fill="#8A7A60" font-family="system-ui,sans-serif">${axes[i]}</text>`;
  });
  const sp=scores.map((s,i)=>pt(i,Math.max(s,0.25)));
  return`<svg width="280" height="244" viewBox="0 0 280 244" style="display:block;margin:0 auto">${g}${al}<polygon points="${sp.map(p=>p.map(v=>v.toFixed(1)).join(',')).join(' ')}" fill="${color}1F" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>${sp.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4.5" fill="${color}" stroke="white" stroke-width="1.5"/>`).join('')}${lb}</svg>`;
}
function axSc(catId,ans){

  return tot.map((t,i)=>cnt[i]?+(t/cnt[i]).toFixed(1):0);
}

  let h=`<div class="p18"><p style="font-size:10px;font-weight:700;letter-spacing:1.4px;color:var(--cr);">SKILL DEVELOPMENT</p><h2 style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:var(--tx);margin:4px 0 3px;">Skill Assessments</h2><p style="font-size:12px;color:var(--mt);margin-bottom:16px;">Evaluate your competencies across four key areas.</p>`;
  Object.entries(CATS).forEach(([id,cat])=>{
    const done=S.completed[id];const avg=done?(done.reduce((a,b)=>a+b,0)/done.length).toFixed(1):null;
    h+=`<button class="ccat" onclick="startQ('${id}')"><div class="cico" style="background:${cat.light};color:${cat.color};">${ICO[id]}</div><div style="flex:1;"><div style="font-weight:700;font-size:14px;color:var(--tx);margin-bottom:2px;">${cat.title}</div><div style="font-size:11px;color:var(--mt);margin-bottom:4px;">${cat.desc}</div>${done?`<span style="font-size:9px;font-weight:700;background:${cat.light};color:${cat.color};border-radius:20px;padding:2px 8px;letter-spacing:0.5px;">COMPLETED · Avg ${avg} / 5</span>`:`<span style="font-size:9px;font-weight:700;color:var(--mt);letter-spacing:0.5px;">10 QUESTIONS · ~8 MIN</span>`}</div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--mt)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>`;
  });
  $('con').innerHTML=h+'</div>';$('con').scrollTop=0;
}
function rq(){
  const cat=CATS[S.cat];const[type,,qtext,opts]=cat.qs[S.qIdx];
  const tc=TC[type]||{bg:'#eee',tx:'#333'};
  const pct=Math.round(S.qIdx/cat.qs.length*100);
  const isLast=S.qIdx===cat.qs.length-1;const hasSel=S.selOpt!==null;
  let h=`<div class="p18"><button class="bk" onclick="goBack()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>${cat.title} Assessment</button><div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--mt);margin-bottom:6px;"><span>Question ${S.qIdx+1} of ${cat.qs.length}</span><span style="color:${cat.color};">${pct}% complete</span></div><div class="qbar"><div class="qfil" style="width:${pct}%;background:${cat.color};"></div></div><span class="qchip" style="background:${tc.bg};color:${tc.tx};">${type.toUpperCase()}</span><p style="font-size:14px;font-weight:600;color:var(--tx);line-height:1.5;margin-bottom:15px;">${qtext}</p>`;
  ['A','B','C','D'].forEach((L,i)=>{
    const sel=S.selOpt===i;
    h+=`<button class="opt" onclick="selO(${i},${opts[i][1]})" style="${sel?`border-color:${cat.color};border-width:2px;background:${cat.light};`:''}"><div class="olet" style="${sel?`background:${cat.color};color:#fff;`:''}">${L}</div><span style="font-size:13px;line-height:1.4;color:var(--tx);">${opts[i][0]}</span></button>`;
  });
  h+=`<button class="nxt" onclick="${isLast?'finQ()':'nextQ()'}" style="background:${hasSel?cat.color:'#E8DFC8'};color:${hasSel?'#fff':'#8A7A60'};${!hasSel?'pointer-events:none;':''}">${isLast?'See My Results →':'Next Question →'}</button></div>`;
  $('con').innerHTML=h;$('con').scrollTop=0;
}
function rr(){
  const cat=CATS[S.cat];const ans=S.completed[S.cat];const sc=axSc(S.cat,ans);
  const overall=(sc.reduce((a,b)=>a+b,0)/sc.length).toFixed(1);
  const idx=sc.map((s,i)=>({s,i,n:cat.full[i]})).sort((a,b)=>b.s-a.s);
  function sqrs(s){return Array(5).fill(0).map((_,i)=>`<span class="sq" style="background:${i<Math.round(s)?cat.color:'#E8DFC8'};"></span>`).join('');}
  let h=`<div class="p18"><button class="bk" onclick="goBack()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>Back to Assessments</button><p style="font-size:10px;font-weight:700;letter-spacing:1.4px;color:${cat.color};margin-bottom:3px;">ASSESSMENT COMPLETE</p><h2 style="font-family:Georgia,serif;font-size:21px;font-weight:700;color:var(--tx);margin-bottom:3px;">${cat.title} Results</h2><p style="font-size:13px;color:var(--mt);margin-bottom:14px;">Overall score: <strong style="color:${cat.color};font-size:17px;">${overall}</strong><span style="font-size:12px;"> / 5</span></p><div style="background:var(--wh);border:1.5px solid var(--bd);border-radius:18px;padding:14px 8px;margin-bottom:11px;">${radar(sc,cat.axes,cat.color)}</div><div style="background:var(--wh);border:1.5px solid var(--bd);border-radius:18px;padding:13px;margin-bottom:11px;"><p style="font-size:9px;font-weight:700;letter-spacing:1.3px;color:var(--mt);margin-bottom:8px;">SKILL BREAKDOWN</p>${cat.full.map((ax,i)=>`<div class="axrow"><span style="font-size:12px;color:var(--tx);">${ax}</span><div style="display:flex;align-items:center;gap:7px;">${sqrs(sc[i])}<span style="font-size:12px;font-weight:700;color:${cat.color};min-width:22px;">${sc[i]}</span></div></div>`).join('')}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;"><div style="background:var(--wh);border:1.5px solid var(--bd);border-radius:14px;padding:12px;"><p style="font-size:9px;font-weight:700;letter-spacing:1px;color:#2A6A30;margin-bottom:8px;">STRENGTHS</p>${idx.slice(0,2).map(x=>`<div style="display:flex;align-items:flex-start;gap:5px;margin-bottom:6px;"><div style="width:6px;height:6px;border-radius:50%;background:#2A6A30;flex-shrink:0;margin-top:3px;"></div><span style="font-size:11px;color:var(--tx);line-height:1.3;">${x.n}</span></div>`).join('')}</div><div style="background:var(--wh);border:1.5px solid var(--bd);border-radius:14px;padding:12px;"><p style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--cr);margin-bottom:8px;">GROWTH AREAS</p>${idx.slice(-2).map(x=>`<div style="display:flex;align-items:flex-start;gap:5px;margin-bottom:6px;"><div style="width:6px;height:6px;border-radius:50%;background:var(--cr);flex-shrink:0;margin-top:3px;"></div><span style="font-size:11px;color:var(--tx);line-height:1.3;">${x.n}</span></div>`).join('')}</div></div><p style="font-size:9px;font-weight:700;letter-spacing:1.3px;color:var(--mt);margin-bottom:9px;">RECOMMENDED RESOURCES</p>${cat.resources.map(r=>`<div class="resc"><div style="flex:1;"><p style="font-size:9px;font-weight:700;letter-spacing:1px;color:${cat.color};margin-bottom:2px;">${r.cat}</p><p style="font-weight:600;font-size:13px;color:var(--tx);margin-bottom:2px;">${r.title}</p><p style="font-size:11px;color:var(--mt);">${r.provider} · ${r.hours}h</p></div><button style="background:${cat.color};border:none;border-radius:20px;padding:6px 13px;font-size:11px;color:#fff;font-weight:700;cursor:pointer;white-space:nowrap;font-family:system-ui;">Enroll</button></div>`).join('')}<button onclick="startQ('${S.cat}')" style="width:100%;background:none;border:1.5px solid ${cat.color};border-radius:13px;padding:13px;font-size:13px;font-weight:700;color:${cat.color};cursor:pointer;margin-top:4px;font-family:system-ui;">Retake Assessment</button></div>`;
  $('con').innerHTML=h;$('con').scrollTop=0;
}
function startQ(id){S.cat=id;S.qIdx=0;S.selOpt=null;S.selScore=null;S.answers=[];rq();}
function selO(i,score){S.selOpt=i;S.selScore=score;rq();}
function nextQ(){if(S.selOpt===null)return;S.answers.push(S.selScore);S.qIdx++;S.selOpt=null;S.selScore=null;rq();}
function finQ(){if(S.selOpt===null)return;S.answers.push(S.selScore);S.completed[S.cat]=[...S.answers];rr();}
function goBack(){S.cat=null;S.answers=[];S.selOpt=null;S.selScore=null;rl();}
function sw(t){
  S.tab=t;
  document.querySelectorAll('.ntb').forEach(b=>{b.classList.remove('on');const s=b.querySelector('svg');if(s)s.setAttribute('stroke','var(--mt)');});
  const nb=$(`nb-${t}`);if(nb){nb.classList.add('on');const s=nb.querySelector('svg');if(s)s.setAttribute('stroke','var(--cr)');}
  if(t==='assessments'){rl();}
  else if(t==='home'){
    const entries=Object.entries(S.completed);
    const allSc=entries.flatMap(([id,ans])=>ans);
    const overallPct=allSc.length?Math.round(allSc.reduce((a,b)=>a+b,0)/allSc.length*20):0;
    $('con').innerHTML=`<div class="p18"><p style="font-size:12px;color:var(--mt);">Monday, October 12</p><h1 style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:var(--tx);margin:3px 0 16px;">Good morning, <span style="color:var(--cr);">Alex</span></h1><div style="background:var(--cr);border-radius:20px;padding:18px;margin-bottom:16px;text-align:center;"><p style="font-size:9px;letter-spacing:1.4px;color:rgba(255,255,255,0.55);margin-bottom:6px;">OVERALL PORTFOLIO</p><p style="font-family:Georgia,serif;font-size:44px;font-weight:700;color:#fff;line-height:1;">${overallPct||68}%</p><p style="font-size:11px;color:rgba(255,255,255,0.65);margin-top:4px;">${entries.length} of 4 assessments complete</p></div>${entries.length?`<p style="font-size:9px;font-weight:700;letter-spacing:1.3px;color:var(--mt);margin-bottom:9px;">ASSESSMENT SCORES</p>${entries.map(([id,ans])=>{const cat=CATS[id];const avg=(ans.reduce((a,b)=>a+b,0)/ans.length).toFixed(1);return`<div style="background:var(--wh);border:1.5px solid var(--bd);border-radius:14px;padding:11px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;font-weight:600;color:var(--tx);">${cat.title}</span><span style="font-size:15px;font-weight:700;color:${cat.color};">${avg}<span style="font-size:11px;color:var(--mt);">/5</span></span></div>`}).join('')}`:`<p style="font-size:13px;color:var(--mt);text-align:center;padding:24px 0;line-height:1.5;">Complete assessments to see<br>your progress here.</p>`}<button onclick="sw('assessments')" style="width:100%;background:var(--cr);border:none;border-radius:14px;padding:14px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:system-ui;margin-top:8px;">Go to Assessments →</button></div>`;
  } else {
    $('con').innerHTML=`<div style="padding:60px 16px;text-align:center;"><p style="font-size:14px;color:var(--mt);">${t.charAt(0).toUpperCase()+t.slice(1)}</p><p style="font-size:12px;color:var(--bd);margin-top:4px;">Coming soon</p></div>`;
  }
  $('con').scrollTop=0;
}
rl();
</script>
