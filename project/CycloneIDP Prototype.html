<style>
:root {
  --cr: #C8102E; --lcr: #FCE8EC; --sd: #F1BE48; --tt: #9B945F; --nt: #524727;
  --cm: #FAF6EE; --wh: #FFFFFF; --tx: #1C1208; --mt: #8A7A60; --bd: #E8DFC8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #EFE9DA; min-height: 100vh; font-family: 'Public Sans', system-ui, sans-serif; color: var(--tx); -webkit-font-smoothing: antialiased; }
body { display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 100vh; }
#root { display: contents; }
button { font-family: inherit; } input { font-family: inherit; }
.scr-area { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; background: var(--cm); }
.scr-area::-webkit-scrollbar { display: none; }
.fade-in { animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
@media (max-width: 480px) {
  html, body { background: var(--cm); overscroll-behavior: none; }
  body { padding: 0; align-items: stretch; justify-content: stretch; min-height: 100dvh; }
  #root { display: flex; flex-direction: column; flex: 1; }
  .phone-shell { width: 100vw !important; height: 100vh !important; height: 100dvh !important; border-radius: 0 !important; box-shadow: none !important; }
  .phone-island { display: none !important; }
  .app-body { padding-top: env(safe-area-inset-top, 50px) !important; }
  .twk-panel { width: calc(100vw - 32px) !important; max-width: 280px !important; }
}
</style>

          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>

          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>

}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div className="phone-shell" style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div className="phone-island" style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

function NavIcon({ name, active }) {

  return null;
}

function Donut({ pct, color, size = 116, stroke = 9, label = 'overall' }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c - (pct / 100) * c;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{ transition: 'stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)' }}/>
      <text x={size/2} y={size/2 - 2} textAnchor="middle" fill="#fff" fontFamily="Newsreader, Georgia, serif" fontWeight="700" fontSize="26">{pct}%</text>
      <text x={size/2} y={size/2 + 14} textAnchor="middle" fill="rgba(255,255,255,0.7)" fontFamily="Public Sans, system-ui, sans-serif" fontSize="9" letterSpacing="0.5">{label}</text>
    </svg>
  );
}

function Radar({ scores, axes, color }) {
  const cx = 170, cy = 130, r = 78, n = axes.length;
  const pt = (ai, lv) => {
    const a = (ai / n) * 2 * Math.PI - Math.PI / 2;
    return [cx + (lv / 5) * r * Math.cos(a), cy + (lv / 5) * r * Math.sin(a)];
  };
  const grids = [];
  for (let lv = 1; lv <= 5; lv++) {
    const pts = axes.map((_, i) => pt(i, lv));
    grids.push(<polygon key={lv} points={pts.map(p => p.map(v => v.toFixed(1)).join(',')).join(' ')}
      fill="none" stroke="#E8DFC8" strokeWidth={lv === 5 ? 1.5 : 0.7}/>);
  }
  const sp = scores.map((s, i) => pt(i, Math.max(s, 0.25)));
  return (
    <svg width="100%" height="260" viewBox="0 0 340 260" preserveAspectRatio="xMidYMid meet" style={{ display: 'block', margin: '0 auto', maxWidth: 340 }}>
      {grids}
      {axes.map((_, i) => {
        const p = pt(i, 5);
        return <line key={i} x1={cx} y1={cy} x2={p[0].toFixed(1)} y2={p[1].toFixed(1)} stroke="#E8DFC8" strokeWidth="1"/>;
      })}
      <polygon points={sp.map(p => p.map(v => v.toFixed(1)).join(',')).join(' ')}
        fill={`${color}26`} stroke={color} strokeWidth="2" strokeLinejoin="round"/>
      {sp.map((p, i) => <circle key={i} cx={p[0].toFixed(1)} cy={p[1].toFixed(1)} r="4.5" fill={color} stroke="white" strokeWidth="1.5"/>)}
      {axes.map((ax, i) => {
        const lp = pt(i, 6.4);
        const anch = lp[0] < cx - 8 ? 'end' : lp[0] > cx + 8 ? 'start' : 'middle';
        const dy = lp[1] < cy - 8 ? -2 : lp[1] > cy + 8 ? 13 : 6;
        return <text key={i} x={lp[0].toFixed(1)} y={(lp[1] + dy).toFixed(1)} textAnchor={anch}
          fontSize="10" fill="#524727" fontFamily="Public Sans, system-ui" fontWeight="600">{ax}</text>;
      })}
    </svg>
  );
}

function MiniBar({ pct, color }) {
  return (
    <div style={{ height: 5, background: 'rgba(255,255,255,0.22)', borderRadius: 3, overflow: 'hidden', marginTop: 4 }}>
      <div style={{ width: `${pct}%`, height: '100%', background: color, borderRadius: 3, transition: 'width .8s' }}/>
    </div>
  );
}

// ---------- ASSESSMENT QUIZ ----------
function AssessmentQuiz({ catId, onBack, onComplete }) {
  const cat = CATEGORIES[catId];
  const [qIdx, setQIdx] = useState(0);
  const [selOpt, setSelOpt] = useState(null);
  const [answers, setAnswers] = useState([]);

  const [type, , qtext, opts] = cat.qs[qIdx];
  const tc = TYPE_COLORS[type] || { bg: '#eee', tx: '#333' };
  const pct = Math.round(qIdx / cat.qs.length * 100);
  const isLast = qIdx === cat.qs.length - 1;
  const hasSel = selOpt !== null;

  const next = () => {
    if (selOpt === null) return;
    const newAns = [...answers, opts[selOpt][1]];
    if (isLast) {
      onComplete(catId, newAns);
    } else {
      setAnswers(newAns);
      setQIdx(qIdx + 1);
      setSelOpt(null);
    }
  };

  return (
    <div style={{ padding: '14px 18px 28px', fontFamily: 'Public Sans, system-ui' }}>
      <button onClick={onBack} style={{ display: 'flex', alignItems: 'center', gap: 5, background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 600, padding: 0, marginBottom: 14, color: 'var(--mt)', fontFamily: 'inherit' }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        {cat.title} Assessment
      </button>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, fontWeight: 600, color: 'var(--mt)', marginBottom: 7 }}>
        <span>Question {qIdx + 1} of {cat.qs.length}</span>
        <span style={{ color: cat.color }}>{pct}% complete</span>
      </div>
      <div style={{ height: 4, background: 'var(--bd)', borderRadius: 2, marginBottom: 16, overflow: 'hidden' }}>
        <div style={{ height: '100%', width: `${pct}%`, background: cat.color, borderRadius: 2, transition: 'width .4s' }}/>
      </div>
      <span style={{ display: 'inline-block', fontSize: 9, fontWeight: 700, letterSpacing: 1.1, borderRadius: 20, padding: '3px 9px', marginBottom: 12, background: tc.bg, color: tc.tx }}>{type.toUpperCase()}</span>
      <p style={{ fontSize: 15, fontWeight: 600, color: 'var(--tx)', lineHeight: 1.45, marginBottom: 18, fontFamily: 'Newsreader, Georgia, serif' }}>{qtext}</p>
      {['A', 'B', 'C', 'D'].map((L, i) => {
        const sel = selOpt === i;
        return (
          <button key={i} onClick={() => setSelOpt(i)} style={{ background: sel ? cat.light : 'var(--wh)', border: sel ? `2px solid ${cat.color}` : '1.5px solid var(--bd)', borderRadius: 13, padding: sel ? '9px 11px' : '10px 12px', marginBottom: 8, cursor: 'pointer', display: 'flex', alignItems: 'flex-start', gap: 10, width: '100%', textAlign: 'left', fontFamily: 'inherit', transition: 'all .15s' }}>
            <div style={{ width: 22, height: 22, borderRadius: '50%', background: sel ? cat.color : 'var(--bd)', color: sel ? '#fff' : 'var(--mt)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, flexShrink: 0 }}>{L}</div>
            <span style={{ fontSize: 13, lineHeight: 1.4, color: 'var(--tx)' }}>{opts[i][0]}</span>
          </button>
        );
      })}
      <button onClick={next} disabled={!hasSel}
        style={{ width: '100%', border: 'none', borderRadius: 13, padding: 14, fontSize: 14, fontWeight: 700, cursor: hasSel ? 'pointer' : 'default', marginTop: 12, fontFamily: 'inherit', background: hasSel ? cat.color : 'var(--bd)', color: hasSel ? '#fff' : 'var(--mt)' }}>
        {isLast ? 'See My Results →' : 'Next Question →'}
      </button>
    </div>
  );
}

// ---------- ASSESSMENT RESULTS ----------
function AssessmentResults({ catId, onBack, state }) {
  const cat = CATEGORIES[catId];
  const ans = state.completed[catId] || [];
  const tot = Array(5).fill(0), cnt = Array(5).fill(0);
  ans.forEach((sc, i) => { const ax = cat.qs[i][1]; tot[ax] += sc; cnt[ax]++; });
  const sc = tot.map((t, i) => cnt[i] ? +(t / cnt[i]).toFixed(1) : 0);
  const overall = (sc.reduce((a, b) => a + b, 0) / sc.length).toFixed(1);
  const ranked = sc.map((s, i) => ({ s, n: cat.full[i] })).sort((a, b) => b.s - a.s);
  const sqr = (s) => Array(5).fill(0).map((_, i) =>
    <span key={i} style={{ width: 9, height: 9, borderRadius: 2, background: i < Math.round(s) ? cat.color : 'var(--bd)', display: 'inline-block', marginRight: 2 }}/>);
  return (
    <div style={{ padding: '14px 18px 28px', fontFamily: 'Public Sans, system-ui' }}>
      <button onClick={onBack} style={{ display: 'flex', alignItems: 'center', gap: 5, background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 600, padding: 0, marginBottom: 12, color: 'var(--mt)', fontFamily: 'inherit' }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Assessments
      </button>
      <p style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.4, color: cat.color, marginBottom: 4 }}>ASSESSMENT COMPLETE</p>
      <h2 style={{ fontFamily: 'Newsreader, Georgia, serif', fontSize: 24, fontWeight: 700, color: 'var(--tx)', marginBottom: 4 }}>{cat.title} Results</h2>
      <p style={{ fontSize: 13, color: 'var(--mt)', marginBottom: 14 }}>Overall: <strong style={{ color: cat.color, fontSize: 18, fontFamily: 'Newsreader, Georgia, serif' }}>{overall}</strong><span style={{ fontSize: 12 }}> / 5</span></p>
      <div style={{ background: 'var(--wh)', border: '1.5px solid var(--bd)', borderRadius: 18, padding: '14px 8px', marginBottom: 12 }}>
        <Radar scores={sc} axes={cat.axes} color={cat.color}/>
      </div>
      <div style={{ background: 'var(--wh)', border: '1.5px solid var(--bd)', borderRadius: 18, padding: 14, marginBottom: 12 }}>
        <p style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1.3, color: 'var(--mt)', marginBottom: 10 }}>SKILL BREAKDOWN</p>
        {cat.full.map((ax, i) => (
          <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '7px 0', borderBottom: i < cat.full.length - 1 ? '1px solid var(--bd)' : 'none' }}>
            <span style={{ fontSize: 12.5, color: 'var(--tx)' }}>{ax}</span>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              {sqr(sc[i])}
              <span style={{ fontSize: 12.5, fontWeight: 700, color: cat.color, minWidth: 22, fontFamily: 'Newsreader, Georgia, serif' }}>{sc[i]}</span>
            </div>
          </div>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
        <div style={{ background: 'var(--wh)', border: '1.5px solid var(--bd)', borderRadius: 14, padding: 12 }}>
          <p style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, color: '#2A6A30', marginBottom: 8 }}>STRENGTHS</p>
          {ranked.slice(0, 2).map((x, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 6, marginBottom: 6 }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#2A6A30', flexShrink: 0, marginTop: 4 }}/>
              <span style={{ fontSize: 11, color: 'var(--tx)', lineHeight: 1.3 }}>{x.n}</span>
            </div>
          ))}
        </div>
        <div style={{ background: 'var(--wh)', border: '1.5px solid var(--bd)', borderRadius: 14, padding: 12 }}>
          <p style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, color: cat.color, marginBottom: 8 }}>FOCUS AREAS</p>
          {ranked.slice(-2).reverse().map((x, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 6, marginBottom: 6 }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: cat.color, flexShrink: 0, marginTop: 4 }}/>
              <span style={{ fontSize: 11, color: 'var(--tx)', lineHeight: 1.3 }}>{x.n}</span>
            </div>
          ))}
        </div>
      </div>
      {/* Recommendations */}
      <Recommendations cat={cat} catId={catId} state={state} weakest={ranked.slice(-2).reverse()}/>

      <button onClick={onBack} style={{ width: '100%', background: cat.color, color: '#fff', border: 'none', borderRadius: 13, padding: 13, fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>
        Continue →
      </button>
    </div>
  );
}

// ---------- RECOMMENDATIONS ----------
function Recommendations({ cat, catId, state, weakest }) {
  const workshops = WORKSHOPS.filter(w => w.cat === catId).slice(0, 2);
  const micros = MICRO_CREDS.filter(m => m.cat === catId).slice(0, 1);
  const items = [...workshops, ...micros].slice(0, 3);
  if (items.length === 0) return null;
  const focusList = weakest.map(w => w.n).join(' & ');
  return (
    <div style={{ background: 'var(--wh)', border: '1.5px solid var(--bd)', borderRadius: 18, padding: 14, marginBottom: 12 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 5 }}>
        <div style={{ width: 22, height: 22, borderRadius: '50%', background: cat.light, color: cat.color, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <p style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: 1.3, color: 'var(--tx)' }}>RECOMMENDED FOR YOU</p>
      </div>
      <p style={{ fontSize: 11, color: 'var(--mt)', lineHeight: 1.45, marginBottom: 12, paddingLeft: 29 }}>
        To strengthen <span style={{ color: cat.color, fontWeight: 700 }}>{focusList}</span>
      </p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {items.map(item => {
          const isMicro = !item.date;
          const isEnrolled = state.enrolled.includes(item.id);
          return (
            <div key={item.id} onClick={() => state.openDetail(item, isMicro ? 'micro' : 'workshop')}
              style={{ background: cat.light, borderRadius: 12, padding: '11px 12px', display: 'flex', gap: 10, alignItems: 'center', cursor: 'pointer', border: `1.5px solid ${cat.color}22` }}>
              <div style={{ width: 36, height: 36, borderRadius: 10, background: '#fff', color: cat.color, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                {isMicro
                  ? <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
                  : <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 2 }}>
                  <span style={{ fontSize: 8.5, fontWeight: 700, letterSpacing: 0.8, color: cat.color, background: '#fff', padding: '1px 5px', borderRadius: 4 }}>
                    {isMicro ? 'CREDENTIAL' : 'WORKSHOP'}
                  </span>
                  {isEnrolled && <span style={{ fontSize: 9, fontWeight: 700, color: '#2A6A30', display: 'flex', alignItems: 'center', gap: 2 }}><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Enrolled</span>}
                </div>
                <p style={{ fontSize: 12.5, fontWeight: 700, color: 'var(--tx)', lineHeight: 1.25, fontFamily: 'Newsreader, Georgia, serif', marginBottom: 1 }}>{item.title}</p>
                <p style={{ fontSize: 10.5, color: 'var(--mt)', lineHeight: 1.3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                  {isMicro ? `${item.duration} · ${item.modules} modules` : (() => {
                    const dt = new Date(item.date + 'T00:00:00');
                    return `${dt.toLocaleDateString('en', { month: 'short', day: 'numeric' })} · ${item.time}`;
                  })()}
                </p>
              </div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={cat.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          );
        })}
      </div>
    </div>
  );
}

Object.assign(window, { NavIcon, Donut, Radar, MiniBar, HomeScreen, AssessmentsList, AssessmentQuiz, AssessmentResults });

</script>

const { useState: useState2 } = React;

// ---------- RESOURCES ----------

                const done = (i + 1) / g.milestones.length * 100 <= g.progress;
                return (
                  <span key={i} style={{ fontSize: 10, padding: '3px 9px', borderRadius: 12, background: done ? cat.light : 'transparent', color: done ? cat.color : 'var(--mt)', border: done ? 'none' : '1px solid var(--bd)', fontWeight: done ? 700 : 500 }}>

                );
              })}

            <div style={{ display: 'flex', gap: 8, marginTop: 11 }}>
              <button onClick={() => state.bumpGoal(g.id, 10)} style={{ flex: 1, background: cat.color, color: '#fff', border: 'none', borderRadius: 9, padding: '7px', fontSize: 11, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>+ Log Progress</button>

            </div>

        <>

                  <p style={{ fontSize: 10.5, color: 'var(--mt)', marginTop: 2 }}>{m.duration}</p>

        </>
      )}
    </div>
  );
}

function NewGoalForm({ state, close }) {
  const [title, setTitle] = useState2('');
  const [cat, setCat] = useState2('research');
  const [due, setDue] = useState2('Dec 31');
  const submit = () => {
    if (!title.trim()) return;
    state.addGoal({ id: 'g' + Date.now(), title, cat, due, progress: 0, milestones: ['Plan', 'Start', 'Mid-point', 'Complete'] });

}

<script type="text/babel">
// Onboarding flow — welcome screen + login/signup
const { useState: useStateO } = React;

function OnboardingFlow({ onComplete, defaultName }) {
  const [view, setView] = useStateO('welcome'); // welcome, login, signup
  const [email, setEmail] = useStateO('');
  const [password, setPassword] = useStateO('');
  const [name, setName] = useStateO('');
  const [error, setError] = useStateO('');
  const [showPassword, setShowPassword] = useStateO(false);

  const validateISU = (em) => /^[a-z0-9._-]+@iastate\.edu$/i.test(em.trim());

  const submitLogin = (e) => {
    e?.preventDefault?.();
    if (!validateISU(email)) { setError('Please use your @iastate.edu email'); return; }
    if (password.length < 6) { setError('Password must be at least 6 characters'); return; }
    setError('');
    const inferredName = email.split('@')[0].split(/[._-]/)[0];
    onComplete({ email, name: inferredName.charAt(0).toUpperCase() + inferredName.slice(1) });
  };

  const submitSignup = (e) => {
    e?.preventDefault?.();
    if (!name.trim()) { setError('Please enter your name'); return; }
    if (!validateISU(email)) { setError('Please use your @iastate.edu email'); return; }
    if (password.length < 6) { setError('Password must be at least 6 characters'); return; }
    setError('');
    onComplete({ email, name: name.trim() });
  };

  return (
    <div style={{ position: 'absolute', inset: 0, background: 'var(--cm)', zIndex: 200, display: 'flex', flexDirection: 'column', fontFamily: 'Public Sans, system-ui', overflow: 'hidden' }}>
      {/* Decorative background */}
      <div aria-hidden style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse 80% 60% at 50% -10%, #FCE8EC 0%, transparent 60%), radial-gradient(ellipse 90% 70% at 50% 110%, #F5F3E6 0%, transparent 60%)', pointerEvents: 'none' }}/>

      {view === 'welcome' && (
        <WelcomeView setView={setView}/>
      )}

      {(view === 'login' || view === 'signup') && (
        <AuthView
          view={view}
          setView={setView}
          email={email} setEmail={setEmail}
          password={password} setPassword={setPassword}
          name={name} setName={setName}
          error={error} setError={setError}
          showPassword={showPassword} setShowPassword={setShowPassword}
          onSubmit={view === 'login' ? submitLogin : submitSignup}
        />
      )}
    </div>
  );
}

// ---------- Welcome ----------
function WelcomeView({ setView }) {
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', position: 'relative', zIndex: 1 }}>

      {/* Mascot hero */}

        <img src={window.__resources.mascot} alt="Cy the mascot" style={{ width: 200, height: 'auto', position: 'relative', zIndex: 1, filter: 'drop-shadow(0 12px 24px rgba(28,18,8,0.18))' }}/>
      </div>

      {/* Copy + CTAs */}
      <div style={{ padding: '0 28px 36px', position: 'relative', zIndex: 1 }}>
        <p style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.6, color: 'var(--cr)', textAlign: 'center', marginBottom: 8 }}>WELCOME, CYCLONE</p>
        <h1 style={{ fontFamily: 'Newsreader, Georgia, serif', fontSize: 30, fontWeight: 700, color: 'var(--tx)', lineHeight: 1.1, textAlign: 'center', marginBottom: 10 }}>
          Your <span style={{ color: 'var(--cr)' }}>graduate journey</span>, mapped.
        </h1>
        <p style={{ fontSize: 13.5, color: 'var(--mt)', textAlign: 'center', lineHeight: 1.5, marginBottom: 24, padding: '0 6px' }}>
          Track your skills, build your goals, and grow — all in one place.
        </p>

        <button onClick={() => setView('signup')}
          style={{ width: '100%', background: 'var(--cr)', color: '#fff', border: 'none', borderRadius: 12, padding: '14px', fontSize: 14.5, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', letterSpacing: 0.3, marginBottom: 10 }}>

                  : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>}

<script type="text/babel">
// Calendar modal — month view of workshops
const { useState: useStateC } = React;

function CalendarModal({ workshops, enrolled, toggleEnroll, onClose, openDetail }) {
  const [view, setView] = useStateC(new Date(2026, 9, 1)); // October 2026
  const [selected, setSelected] = useStateC(null);

  const year = view.getFullYear();
  const month = view.getMonth();
  const monthName = view.toLocaleString('en', { month: 'long' });
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date(2026, 9, 12); // Oct 12, 2026

  const workshopsByDate = {};
  workshops.forEach(w => {
    const d = new Date(w.date + 'T00:00:00');
    if (d.getFullYear() === year && d.getMonth() === month) {
      const key = d.getDate();
      if (!workshopsByDate[key]) workshopsByDate[key] = [];
      workshopsByDate[key].push(w);
    }
  });

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const navMonth = (delta) => {
    setView(new Date(year, month + delta, 1));
    setSelected(null);
  };

  const selectedWorkshops = selected ? (workshopsByDate[selected] || []) : [];

  return (
    <div style={{ position: 'absolute', inset: 0, background: 'rgba(28,18,8,0.55)', zIndex: 100, display: 'flex', alignItems: 'flex-end', fontFamily: 'Public Sans, system-ui' }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: 'var(--cm)', width: '100%', borderRadius: '20px 20px 0 0', maxHeight: '92%', overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
        {/* Header */}
        <div style={{ padding: '14px 18px 10px', borderBottom: '1px solid var(--bd)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <h2 style={{ fontFamily: 'Newsreader, Georgia, serif', fontSize: 20, fontWeight: 700, color: 'var(--tx)' }}>Workshops Calendar</h2>
            <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--mt)" strokeWidth="2.2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <button onClick={() => navMonth(-1)} style={{ background: 'var(--wh)', border: '1.5px solid var(--bd)', borderRadius: 9, width: 32, height: 32, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--tx)" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <p style={{ fontFamily: 'Newsreader, Georgia, serif', fontSize: 17, fontWeight: 700, color: 'var(--tx)' }}>{monthName} {year}</p>
            <button onClick={() => navMonth(1)} style={{ background: 'var(--wh)', border: '1.5px solid var(--bd)', borderRadius: 9, width: 32, height: 32, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--tx)" strokeWidth="2.5" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>

        {/* Calendar grid */}
        <div style={{ padding: '12px 14px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3, marginBottom: 6 }}>
            {['S','M','T','W','T','F','S'].map((d, i) => (
              <div key={i} style={{ textAlign: 'center', fontSize: 10, fontWeight: 700, color: 'var(--mt)', letterSpacing: 0.6, padding: '4px 0' }}>{d}</div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
            {cells.map((d, i) => {
              if (d === null) return <div key={i}/>;
              const ws = workshopsByDate[d] || [];
              const has = ws.length > 0;
              const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
              const isSel = selected === d;
              return (
                <button key={i} onClick={() => has && setSelected(d)}
                  style={{ aspectRatio: '1', border: 'none', borderRadius: 9, cursor: has ? 'pointer' : 'default', background: isSel ? 'var(--cr)' : isToday ? 'var(--lcr)' : has ? 'var(--wh)' : 'transparent', color: isSel ? '#fff' : 'var(--tx)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2, fontFamily: 'inherit', position: 'relative', border: has && !isSel ? '1.5px solid var(--bd)' : 'none' }}>
                  <span style={{ fontFamily: 'Newsreader, Georgia, serif', fontSize: 14, fontWeight: isToday || isSel ? 700 : 500 }}>{d}</span>
                  {has && (
                    <div style={{ display: 'flex', gap: 2 }}>
                      {ws.slice(0, 3).map((w, j) => {
                        const cat = CATEGORIES[w.cat];
                        return <div key={j} style={{ width: 4, height: 4, borderRadius: '50%', background: isSel ? '#fff' : cat.color }}/>;
                      })}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        </div>

        {/* Selected day workshops or all-month list */}
        <div style={{ padding: '6px 18px 24px', flex: 1 }}>
          {selected ? (
            <>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.3, color: 'var(--mt)' }}>{monthName.toUpperCase()} {selected} · {selectedWorkshops.length} EVENT{selectedWorkshops.length !== 1 ? 'S' : ''}</p>
                <button onClick={() => setSelected(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--cr)', fontSize: 11, fontWeight: 700, fontFamily: 'inherit' }}>Show all month</button>
              </div>
              {selectedWorkshops.map(w => <WorkshopRow key={w.id} w={w} enrolled={enrolled} toggleEnroll={toggleEnroll} openDetail={openDetail}/>)}
            </>
          ) : (
            <>
              <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.3, color: 'var(--mt)', marginBottom: 10 }}>{Object.keys(workshopsByDate).length} EVENTS THIS MONTH</p>
              {Object.entries(workshopsByDate).sort((a, b) => +a[0] - +b[0]).flatMap(([d, ws]) => ws).map(w => <WorkshopRow key={w.id} w={w} enrolled={enrolled} toggleEnroll={toggleEnroll} openDetail={openDetail}/>)}
              {Object.keys(workshopsByDate).length === 0 && (
                <p style={{ textAlign: 'center', fontSize: 13, color: 'var(--mt)', padding: '32px 0' }}>No workshops scheduled this month.</p>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function WorkshopRow({ w, enrolled, toggleEnroll, openDetail }) {
  const cat = CATEGORIES[w.cat];
  const dt = new Date(w.date + 'T00:00:00');
  const m = dt.toLocaleString('en', { month: 'short' }).toUpperCase();
  const d = dt.getDate();
  const isEnrolled = enrolled.includes(w.id);
  return (
    <div style={{ background: 'var(--wh)', border: '1.5px solid var(--bd)', borderRadius: 14, padding: 12, marginBottom: 9, display: 'flex', gap: 11, alignItems: 'center' }}>
      <div style={{ width: 44, height: 50, background: cat.color, borderRadius: 9, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: '#fff', flexShrink: 0 }}>
        <span style={{ fontFamily: 'Newsreader, Georgia, serif', fontSize: 17, fontWeight: 700, lineHeight: 1 }}>{d}</span>
        <span style={{ fontSize: 8.5, fontWeight: 700, letterSpacing: 0.5, marginTop: 2 }}>{m}</span>
      </div>
      <div style={{ flex: 1 }}>
        <p style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, color: cat.color, marginBottom: 2 }}>{cat.title.toUpperCase()}</p>
        <p style={{ fontSize: 13, fontWeight: 700, color: 'var(--tx)', lineHeight: 1.25, marginBottom: 3 }}>{w.title}</p>
        <p style={{ fontSize: 10.5, color: 'var(--mt)', lineHeight: 1.3 }}>{w.time} · {w.loc}</p>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 5, alignItems: 'stretch', flexShrink: 0 }}>
        <button onClick={() => toggleEnroll(w.id)}
          style={{ background: isEnrolled ? 'var(--wh)' : 'var(--cr)', color: isEnrolled ? 'var(--cr)' : '#fff', border: isEnrolled ? '1.5px solid var(--cr)' : 'none', borderRadius: 8, padding: '6px 11px', fontSize: 10.5, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>
          {isEnrolled ? '✓' : 'Register'}
        </button>
        {openDetail && (
          <button onClick={() => openDetail(w)} aria-label="More info"
            style={{ background: 'var(--wh)', color: 'var(--mt)', border: '1.5px solid var(--bd)', borderRadius: 8, padding: '4px', cursor: 'pointer', fontFamily: 'inherit', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4, fontSize: 9.5, fontWeight: 600 }}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            Info
          </button>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { CalendarModal });

</script>

<script type="text/babel">

const { useState, useEffect, useMemo } = React;

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#C8102E",
  "accentColor": "#F1BE48",
  "userName": "Alex",
  "userLastName": "",
  "showStatusBar": true,
  "headlineFont": "Newsreader"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS_DEFAULTS);
  const [tab, setTab] = useState('home');
  const [assessmentView, setAssessmentView] = useState({ catId: null, view: 'list' });
  const [completed, setCompleted] = useState({});
  const [enrolled, setEnrolled] = useState(['m1', 'w2']);
  const [goals, setGoals] = useState(GOALS_DEFAULT);
  const [resourcesTab, setResourcesTab] = useState('workshops');
  const [addingGoal, setAddingGoal] = useState(false);
  const [calendarOpen, setCalendarOpen] = useState(false);
  const [detailItem, setDetailItem] = useState(null);
  const [toast, setToast] = useState(null);
  const [signedIn, setSignedIn] = useState(false);

  useEffect(() => {
    document.documentElement.style.setProperty('--cr', tweaks.primaryColor);
    document.documentElement.style.setProperty('--sd', tweaks.accentColor);
  }, [tweaks.primaryColor, tweaks.accentColor]);

  const toggleEnroll = (id) => setEnrolled((prev) => {
    if (prev.includes(id)) return prev.filter((x) => x !== id);
    const item = WORKSHOPS.find(w => w.id === id) || MICRO_CREDS.find(m => m.id === id);
    if (item) {
      const kind = WORKSHOPS.find(w => w.id === id) ? 'workshop' : 'micro';
      setToast({ title: item.title, kind });
    }
    return [...prev, id];
  });
  const addGoal = (g) => setGoals((prev) => [g, ...prev]);
  const removeGoal = (id) => setGoals((prev) => prev.filter((g) => g.id !== id));
  const bumpGoal = (id, n) => setGoals((prev) => prev.map((g) => g.id === id ? { ...g, progress: Math.min(100, g.progress + n) } : g));

  const state = { completed, enrolled, goals, toggleEnroll, addGoal, removeGoal, bumpGoal, resourcesTab, userName: tweaks.userName, userLastName: tweaks.userLastName, openCalendar: () => setCalendarOpen(true), openDetail: (item, kind) => setDetailItem({ item, kind }) };

  const scoresPct = useMemo(() => {
    const out = {};
    Object.keys(CATEGORIES).forEach((k) => {
      const ans = completed[k];
      const defaults = { research: 74, teaching: 65, communication: 62, career: 58 };
      if (ans && ans.length) {
        const avg = ans.reduce((a, b) => a + b, 0) / ans.length;
        out[k] = Math.round(avg / 5 * 100);
      } else {
        out[k] = defaults[k];
      }
    });
    return out;
  }, [completed]);

  const overallPct = useMemo(() => Math.round(Object.values(scoresPct).reduce((a, b) => a + b, 0) / 4), [scoresPct]);

  const go = (newTab, sub) => {
    setTab(newTab);
    if (sub === 'goal') setAddingGoal(true);
    if (sub === 'workshops') setResourcesTab('workshops');
    if (newTab === 'assessments') setAssessmentView({ catId: null, view: 'list' });
  };

  const openAssessment = (id) => setAssessmentView({ catId: id, view: 'quiz' });
  const completeAssessment = (id, ans) => {
    setCompleted((prev) => ({ ...prev, [id]: ans }));
    setAssessmentView({ catId: id, view: 'results' });
  };
  const backToList = () => setAssessmentView({ catId: null, view: 'list' });

  let content;
  if (tab === 'home') content = <HomeScreen state={state} go={go} scoresPct={scoresPct} overallPct={overallPct} />;else
  if (tab === 'assessments') {
    if (assessmentView.view === 'list') content = <AssessmentsList state={state} openAssessment={openAssessment} />;else
    if (assessmentView.view === 'quiz') content = <AssessmentQuiz catId={assessmentView.catId} onBack={backToList} onComplete={completeAssessment} />;else
    content = <AssessmentResults catId={assessmentView.catId} onBack={backToList} state={state} />;
  } else
  if (tab === 'resources') content = <ResourcesScreen state={{ ...state, resourcesTab }} />;else
  if (tab === 'profile') content = <ProfileScreen state={state} scoresPct={scoresPct} overallPct={overallPct} addingGoal={addingGoal} setAddingGoal={setAddingGoal} />;

  const headerBar =
  <div style={{ background: 'var(--cm)', borderBottom: '1px solid var(--bd)', padding: '10px 18px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
      <img src={window.__resources.logo} alt="CycloneIDP" style={{ display: 'block', width: "80.875px", height: "40.9922px" }} />
      <button onClick={() => setTab('profile')} style={{ width: 36, height: 36, borderRadius: '50%', background: 'var(--cr)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 14, fontWeight: 700, fontFamily: `${tweaks.headlineFont}, Georgia, serif`, border: 'none', cursor: 'pointer' }}>
        {tweaks.userName.charAt(0).toUpperCase()}
      </button>
    </div>;

  const navBar =
  <div style={{ background: 'var(--wh)', borderTop: '1px solid var(--bd)', display: 'flex', flexShrink: 0, paddingBottom: 'max(6px, env(safe-area-inset-bottom))' }}>
      {[
    ['home', 'Home'],
    ['assessments', 'Skill Assessment'],
    ['resources', 'Resources'],
    ['profile', 'Profile']].
    map(([k, l]) => {
      const active = tab === k;
      return (
        <button key={k} onClick={() => go(k)} style={{ flex: 1, padding: '10px 2px 4px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, background: 'none', border: 'none', cursor: 'pointer', position: 'relative' }}>
            <NavIcon name={k} active={active} />
            <span style={{ fontSize: 9.5, fontWeight: active ? 700 : 500, color: active ? 'var(--cr)' : 'var(--mt)', fontFamily: 'Public Sans, system-ui' }}>{l}</span>
            {active && <div style={{ position: 'absolute', bottom: 0, width: 18, height: 2, background: 'var(--cr)', borderRadius: 1 }} />}
          </button>);
    })}
    </div>;

  return (
    <>
      <IOSDevice width={390} height={844}>
        {!signedIn ? (
          <OnboardingFlow onComplete={({ email, name }) => {
            if (name) {
              const parts = name.trim().split(/\s+/);
              setTweak('userName', parts[0]);
              setTweak('userLastName', parts.slice(1).join(' '));
            }
            setSignedIn(true);
          }}/>
        ) : (
        <div className="app-body" data-screen-label={tab} style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--cm)', paddingTop: 50 }}>
          {headerBar}
          <div className="scr-area" key={tab + assessmentView.view + (assessmentView.catId || '')}>
            <div className="fade-in">{content}</div>
          </div>
          {navBar}
          {calendarOpen && <CalendarModal workshops={WORKSHOPS} enrolled={enrolled} toggleEnroll={toggleEnroll} onClose={() => setCalendarOpen(false)} openDetail={(item) => setDetailItem({ item, kind: 'workshop' })}/>}
          {detailItem && <ResourceDetailModal item={detailItem.item} kind={detailItem.kind} enrolled={enrolled} toggleEnroll={toggleEnroll} onClose={() => setDetailItem(null)}/>}
          {toast && <RegistrationToast title={toast.title} kind={toast.kind} onClose={() => setToast(null)}/>}
        </div>
        )}
      </IOSDevice>
      <TweaksPanel title="Tweaks">
        <TweakSection title="Brand">
          <TweakColor label="Primary color" value={tweaks.primaryColor} onChange={(v) => setTweak('primaryColor', v)} />
          <TweakColor label="Accent (gold)" value={tweaks.accentColor} onChange={(v) => setTweak('accentColor', v)} />
          <TweakSelect label="Headline font" value={tweaks.headlineFont} onChange={(v) => setTweak('headlineFont', v)}
          options={[
          { value: 'Newsreader', label: 'Newsreader (default)' },
          { value: 'Georgia', label: 'Georgia' },
          { value: 'Inter', label: 'Inter (sans)' }]
          } />
        </TweakSection>
        <TweakSection title="Profile">
          <TweakText label="User first name" value={tweaks.userName} onChange={(v) => setTweak('userName', v)} />
        </TweakSection>
      </TweaksPanel>
    </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
