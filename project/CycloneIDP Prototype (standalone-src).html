<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CycloneIDP Prototype</title>
<meta name="ext-resource-dependency" content="logo.png" data-resource-id="logo" />
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Inter:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --cr: #C8102E;       /* primary cardinal */
  --lcr: #FCE8EC;      /* primary tint */
  --sd: #F1BE48;       /* secondary gold */
  --tt: #9B945F;       /* tertiary */
  --nt: #524727;       /* neutral */
  --cm: #FAF6EE;       /* cream bg */
  --wh: #FFFFFF;
  --tx: #1C1208;       /* text */
  --mt: #8A7A60;       /* muted */
  --bd: #E8DFC8;       /* border */
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #EFE9DA; min-height: 100vh; font-family: 'Public Sans', system-ui, sans-serif; color: var(--tx); -webkit-font-smoothing: antialiased; }
body { display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 100vh; }
button { font-family: inherit; }
input { font-family: inherit; }
.scr-area { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; background: var(--cm); }
.scr-area::-webkit-scrollbar { display: none; }
.fade-in { animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#EFE9DA">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#EFE9DA"/>
    <rect x="380" y="120" width="440" height="560" rx="48" fill="#FAF6EE" stroke="#E8DFC8" stroke-width="3"/>
    <rect x="500" y="220" width="200" height="32" rx="4" fill="#C8102E"/>
    <text x="600" y="247" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#FAF6EE" text-anchor="middle">CycloneIDP</text>
    <circle cx="600" cy="430" r="80" fill="none" stroke="#C8102E" stroke-width="14"/>
    <circle cx="600" cy="430" r="80" fill="none" stroke="#F1BE48" stroke-width="14" stroke-dasharray="340 502" transform="rotate(-90 600 430)" stroke-linecap="round"/>
    <text x="600" y="440" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#1C1208" text-anchor="middle">68%</text>
    <rect x="450" y="560" width="300" height="14" rx="7" fill="#C8102E"/>
    <rect x="450" y="590" width="220" height="14" rx="7" fill="#F1BE48"/>
    <rect x="450" y="620" width="180" height="14" rx="7" fill="#9B945F"/>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="calendar.jsx"></script>

<script type="text/babel">

const { useState, useEffect, useMemo } = React;

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#C8102E",
  "accentColor": "#F1BE48",
  "userName": "Alex",
  "showStatusBar": true,
  "headlineFont": "Newsreader"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS_DEFAULTS);
  const [tab, setTab] = useState('home');
  const [assessmentView, setAssessmentView] = useState({ catId: null, view: 'list' }); // list, quiz, results
  const [completed, setCompleted] = useState({});
  const [enrolled, setEnrolled] = useState(['m1', 'w2']);
  const [goals, setGoals] = useState(GOALS_DEFAULT);
  const [resourcesTab, setResourcesTab] = useState('workshops');
  const [addingGoal, setAddingGoal] = useState(false);
  const [calendarOpen, setCalendarOpen] = useState(false);

  // Apply tweak colors via CSS variables
  useEffect(() => {
    document.documentElement.style.setProperty('--cr', tweaks.primaryColor);
    document.documentElement.style.setProperty('--sd', tweaks.accentColor);
  }, [tweaks.primaryColor, tweaks.accentColor]);

  const toggleEnroll = (id) => setEnrolled((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]);
  const addGoal = (g) => setGoals((prev) => [g, ...prev]);
  const removeGoal = (id) => setGoals((prev) => prev.filter((g) => g.id !== id));
  const bumpGoal = (id, n) => setGoals((prev) => prev.map((g) => g.id === id ? { ...g, progress: Math.min(100, g.progress + n) } : g));

  const state = { completed, enrolled, goals, toggleEnroll, addGoal, removeGoal, bumpGoal, resourcesTab, openCalendar: () => setCalendarOpen(true) };

  // Compute scores
  const scoresPct = useMemo(() => {
    const out = {};
    Object.keys(CATEGORIES).forEach((k) => {
      const ans = completed[k];
      // Default seeded illustrative scores when not yet taken (matches reference home screen vibe)
      const defaults = { research: 74, teaching: 65, communication: 62, career: 58 };
      if (ans && ans.length) {
        const avg = ans.reduce((a, b) => a + b, 0) / ans.length;
        out[k] = Math.round(avg / 5 * 100);
      } else {
        out[k] = defaults[k];
      }
    });
    return out;
  }, [completed]);

  const overallPct = useMemo(() => Math.round(Object.values(scoresPct).reduce((a, b) => a + b, 0) / 4), [scoresPct]);

  const go = (newTab, sub) => {
    setTab(newTab);
    if (sub === 'goal') setAddingGoal(true);
    if (sub === 'workshops') setResourcesTab('workshops');
    if (newTab === 'assessments') setAssessmentView({ catId: null, view: 'list' });
  };

  const openAssessment = (id) => setAssessmentView({ catId: id, view: 'quiz' });
  const completeAssessment = (id, ans) => {
    setCompleted((prev) => ({ ...prev, [id]: ans }));
    setAssessmentView({ catId: id, view: 'results' });
  };
  const backToList = () => setAssessmentView({ catId: null, view: 'list' });

  let content;
  if (tab === 'home') content = <HomeScreen state={state} go={go} scoresPct={scoresPct} overallPct={overallPct} />;else
  if (tab === 'assessments') {
    if (assessmentView.view === 'list') content = <AssessmentsList state={state} openAssessment={openAssessment} />;else
    if (assessmentView.view === 'quiz') content = <AssessmentQuiz catId={assessmentView.catId} onBack={backToList} onComplete={completeAssessment} />;else
    content = <AssessmentResults catId={assessmentView.catId} onBack={backToList} state={state} />;
  } else
  if (tab === 'resources') content = <ResourcesScreen state={{ ...state, resourcesTab }} />;else
  if (tab === 'profile') content = <ProfileScreen state={state} scoresPct={scoresPct} overallPct={overallPct} addingGoal={addingGoal} setAddingGoal={setAddingGoal} />;

  const headerBar =
  <div style={{ background: 'var(--cm)', borderBottom: '1px solid var(--bd)', padding: '10px 18px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
      <img src={window.__resources?.logo || "logo.png"} alt="CycloneIDP" style={{ display: 'block', width: "80.875px", height: "40.9922px" }} />
      <button onClick={() => setTab('profile')} style={{ width: 36, height: 36, borderRadius: '50%', background: 'var(--cr)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 14, fontWeight: 700, fontFamily: `${tweaks.headlineFont}, Georgia, serif`, border: 'none', cursor: 'pointer' }}>
        {tweaks.userName.charAt(0).toUpperCase()}
      </button>
    </div>;


  const navBar =
  <div style={{ background: 'var(--wh)', borderTop: '1px solid var(--bd)', display: 'flex', flexShrink: 0, paddingBottom: 6 }}>
      {[
    ['home', 'Home'],
    ['assessments', 'Home'],
    ['resources', 'Resources'],
    ['profile', 'Profile']].
    map(([k, l]) => {
      const active = tab === k;
      return (
        <button key={k} onClick={() => go(k)} style={{ flex: 1, padding: '10px 2px 4px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, background: 'none', border: 'none', cursor: 'pointer', position: 'relative' }}>
            <NavIcon name={k} active={active} />
            <span style={{ fontSize: 9.5, fontWeight: active ? 700 : 500, color: active ? 'var(--cr)' : 'var(--mt)', fontFamily: 'Public Sans, system-ui' }}>{l}</span>
            {active && <div style={{ position: 'absolute', bottom: 0, width: 18, height: 2, background: 'var(--cr)', borderRadius: 1 }} />}
          </button>);

    })}
    </div>;


  // Use IOSFrame
  return (
    <>
      <IOSDevice width={390} height={844}>
        <div data-screen-label={tab} style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--cm)', paddingTop: 50 }}>
          {headerBar}
          <div className="scr-area" key={tab + assessmentView.view + (assessmentView.catId || '')}>
            <div className="fade-in">{content}</div>
          </div>
          {navBar}
          {calendarOpen && <CalendarModal workshops={WORKSHOPS} enrolled={enrolled} toggleEnroll={toggleEnroll} onClose={() => setCalendarOpen(false)}/>}
        </div>
      </IOSDevice>
      <TweaksPanel title="Tweaks">
        <TweakSection title="Brand">
          <TweakColor label="Primary color" value={tweaks.primaryColor} onChange={(v) => setTweak('primaryColor', v)} />
          <TweakColor label="Accent (gold)" value={tweaks.accentColor} onChange={(v) => setTweak('accentColor', v)} />
          <TweakSelect label="Headline font" value={tweaks.headlineFont} onChange={(v) => setTweak('headlineFont', v)}
          options={[
          { value: 'Newsreader', label: 'Newsreader (default)' },
          { value: 'Georgia', label: 'Georgia' },
          { value: 'Inter', label: 'Inter (sans)' }]
          } />
        </TweakSection>
        <TweakSection title="Profile">
          <TweakText label="User first name" value={tweaks.userName} onChange={(v) => setTweak('userName', v)} />
        </TweakSection>
        <TweakSection title="Frame">
          <TweakToggle label="Show status bar" value={tweaks.showStatusBar} onChange={(v) => setTweak('showStatusBar', v)} />
        </TweakSection>
      </TweaksPanel>
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
